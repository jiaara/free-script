<script>
function formatCurrency(saldo) {
    saldo = saldo.toString().replace(/\$|\,/g,'');
    if(idNaN(saldo))
    saldo = "0";
    sign = (saldo == (saldo = Math.abs(saldo)));
    saldo = Math.floor(saldo*100+0.50000000001);
    cents = saldo%100;
    saldo = Math.floor(saldo/100).toString();
    if(cents<10)
    cents = "0" + cents;
    for (var i = 0; i < Math.floor((saldo.length-(1+i))/3);
    saldo = saldo.substring(0,saldo.length-(4*i+3))+'.'+saldo.substring(saldo.length-(4*i+3));
    return (((sign)?'':'-') + 'Rp.' + Saldo + ',' + cents);
}
</script>
